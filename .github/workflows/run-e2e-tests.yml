name: Run E2E Tests
on: [pull_request]

jobs:
  run_e2e_tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: bitnami/postgresql
        ports:
          - 5432:5432
        env:
          POSTGRESQL_USERNAME: docker
          POSTGRESQL_PASSWORD: docker
          POSTGRESQL_DATABASE: ponto_seguro_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://docker:docker@localhost:5432/ponto_seguro_db?schema=public


      - name: Run tests
        run: pnpm run test:e2e
        env:
          JWT_SECRET: testing
          DATABASE_URL: postgresql://docker:docker@localhost:5432/ponto_seguro_db?schema=public